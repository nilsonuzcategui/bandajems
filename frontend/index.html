<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JEMS Band - Dashboard</title>
    <!-- manifest.json -->
    <link rel="manifest" href="manifest.json" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet" />

    <link rel="icon" type="image/png" href="https://banda.micasajems.com/images/logobandajems.png" />
    <link rel="apple-touch-icon" href="https://banda.micasajems.com/images/logobandajems.png" />

    <meta name="description" content="Control de eventos, lineup y setlist oficial de la Banda JEMS." />
    <meta name="author" content="Nilson Uzcátegui" />

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://banda.micasajems.com/" />
    <meta property="og:title" content="JEMS Band - Control de Eventos" />
    <meta
      property="og:description"
      content="Consulta el próximo evento, los músicos asignados y el setlist de alabanza de la Banda JEMS."
    />
    <meta property="og:image" content="https://banda.micasajems.com/images/logobandajems.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://banda.micasajems.com/" />
    <meta name="twitter:title" content="JEMS Band - Control de Eventos" />
    <meta name="twitter:description" content="Consulta el próximo evento y lineup oficial de la Banda JEMS." />
    <meta name="twitter:image" content="https://banda.micasajems.com/images/logobandajems.png" />

    <meta name="theme-color" content="#1e1b4b" />

    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .purple-gradient {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #3b0764 100%);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body class="purple-gradient min-h-screen text-slate-100 p-4 md:p-8">
    <div class="max-w-5xl mx-auto" id="main-content">
      <header
        class="flex flex-col md:flex-row justify-between items-center md:items-end gap-4 mb-10 bg-black/20 p-6 rounded-2xl border-b-4 border-purple-500"
      >
        <div class="text-center md:text-left w-full md:w-auto">
          <h1 id="ev-titulo" class="text-2xl md:text-3xl font-bold text-purple-400 italic uppercase leading-tight">
            Cargando...
          </h1>
          <p
            id="ev-fecha"
            class="text-slate-400 flex items-center justify-center md:justify-start gap-2 mt-2 uppercase text-[10px] md:text-sm font-semibold tracking-widest"
          ></p>
        </div>

        <div class="mt-2 md:mt-0 shrink-0">
          <span
            class="bg-purple-600 px-4 py-2 rounded-full text-[10px] md:text-sm font-bold shadow-lg shadow-purple-500/20 whitespace-nowrap"
          >
            PRÓXIMO EVENTO
          </span>
        </div>
      </header>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 space-y-6">
          <h2 class="text-xl font-semibold border-l-4 border-purple-500 pl-3">Lineup Confirmado</h2>
          <div class="grid grid-cols-2 sm:grid-cols-3 gap-4" id="lista-musicos"></div>

          <div class="mt-10">
            <h2 class="text-xl font-semibold border-l-4 border-red-500 pl-3 mb-4">Reporte de Novedades</h2>
            <div id="lista-historico" class="glass-card rounded-xl p-4 space-y-3">
              <p class="text-slate-500 text-sm italic">Sin novedades registradas para este evento.</p>
            </div>
          </div>
        </div>

        <div class="space-y-6">
          <h2 class="text-xl font-semibold border-l-4 border-purple-500 pl-3">Setlist</h2>
          <div class="glass-card rounded-2xl overflow-hidden p-2" id="lista-canciones"></div>
        </div>
      </div>
    </div>

    <div id="seccion-futura" class="mt-16 hidden">
      <div class="flex items-center gap-4 mb-6">
        <div class="h-px flex-1 bg-gradient-to-r from-transparent to-purple-500/50"></div>
        <h2 class="text-sm font-bold text-purple-400 uppercase tracking-[0.3em] whitespace-nowrap">Semana Siguiente</h2>
        <div class="h-px flex-1 bg-gradient-to-l from-transparent to-purple-500/50"></div>
      </div>

      <div class="glass-card rounded-2xl p-6 border-dashed border-purple-500/30">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
          <div>
            <h3 id="futuro-titulo" class="text-xl font-bold text-slate-200 uppercase tracking-wide">--</h3>
            <p id="futuro-fecha" class="text-xs text-slate-500 font-mono mt-1"></p>
          </div>
          <div class="bg-white/5 px-4 py-2 rounded-lg border border-white/10">
            <p class="text-[10px] text-slate-400 uppercase font-bold">Estado</p>
            <p class="text-xs text-green-400 font-bold italic">Confirmado</p>
          </div>
        </div>

        <div id="futuro-lineup" class="flex flex-wrap gap-2"></div>
      </div>
    </div>

    <div id="no-eventos" class="hidden text-center py-20 test">
      <i class="fas fa-calendar-times text-6xl text-slate-700 mb-4"></i>
      <h2 class="text-2xl font-bold">No hay eventos programados</h2>
      <p class="text-slate-400">Nilson, organiza algo en el panel de Admin.</p>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      $(document).ready(function () {
        // const rutaApi = "http://localhost/bandajems/backend/api/";
        const rutaApi = "https://api.micasajems.com/api/";

        // Cargar evento de la semana siguiente
        $.get(rutaApi + "get_future_event.php", function (res) {
          if (res.status === "success") {
            $("#seccion-futura").removeClass("hidden");
            $("#futuro-titulo").text(res.evento.nombre_evento);
            $("#futuro-fecha").text(res.evento.fecha);

            $("#futuro-lineup").empty();
            if (res.lineup.length > 0) {
              res.lineup.forEach((m) => {
                $("#futuro-lineup").append(`
                    <div class="bg-purple-900/20 border border-purple-500/30 px-3 py-1.5 rounded-full flex items-center gap-2">
                        <span class="text-[10px] font-bold text-white">${m.nombre}</span>
                        <span class="text-[9px] text-purple-400 uppercase font-medium border-l border-purple-500/30 pl-2">${m.nombre_rol}</span>
                    </div>
                `);
              });
            } else {
              $("#futuro-lineup").append('<p class="text-xs text-slate-600 italic">Lineup aún no asignado.</p>');
            }
          }
        });

        $.get(rutaApi + "get_next_event_full.php", function (res) {
          if (res.status === "empty") {
            $("#main-content").addClass("hidden");
            $("#no-eventos").removeClass("hidden");
            return;
          }

          // 1. Datos Header
          $("#ev-titulo").text(res.evento.nombre_evento);
          $("#ev-fecha").html(`<i class="far fa-calendar-alt"></i> ${res.evento.fecha}`);

          // 2. Cargar Músicos
          $("#lista-musicos").empty();
          res.lineup.forEach((m) => {
            $("#lista-musicos").append(`
                    <div class="glass-card p-4 rounded-xl flex flex-col items-center text-center hover:scale-105 transition-all">
                        <img src="${m.foto_url || "https://i.pravatar.cc/150?u=" + m.nombre}" class="w-20 h-20 rounded-full border-2 border-purple-500 mb-3 object-cover shadow-lg shadow-purple-500/20" />
                        <span class="font-bold text-sm">${m.nombre}</span>
                        <span class="text-[10px] text-purple-300 uppercase tracking-widest">${m.nombre_rol}</span>
                    </div>
                `);
          });

          // 3. Cargar Histórico
          if (res.historico.length > 0) {
            $("#lista-historico").empty();
            res.historico.forEach((h) => {
              $("#lista-historico").append(`
                        <div class="flex gap-3 text-sm border-b border-white/5 pb-2 last:border-0">
                            <span class="text-red-400 font-bold uppercase text-[9px] mt-1 shrink-0">INCIDENCIA</span>
                            <p><span class="text-purple-300 font-semibold">${h.nombre}:</span> ${h.nota}</p>
                        </div>
                    `);
            });
          }

          // 4. Cargar Canciones
          $("#lista-canciones").empty();
          res.setlist.forEach((c, index) => {
            $("#lista-canciones").append(`
                    <div class="flex items-center justify-between p-4 bg-white/5 rounded-lg mb-2 hover:bg-white/10 transition-colors">
                        <div class="flex items-center gap-3">
                            <span class="text-purple-500 font-bold text-lg">${String(index + 1).padStart(2, "0")}</span>
                            <p class="font-semibold text-sm">${c.titulo}</p>
                        </div>
                        <div class="flex gap-3">
                            <a href="${c.url_youtube}" target="_blank" class="text-red-500 text-lg"><i class="fab fa-youtube"></i></a>
                            ${c.url_spotify ? `<a href="${c.url_spotify}" target="_blank" class="text-green-500 text-lg"><i class="fab fa-spotify"></i></a>` : ""}
                        </div>
                    </div>
                `);
          });
        });
      });

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
