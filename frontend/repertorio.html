<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Repertorio - JEMS Band</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      .purple-gradient {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #3b0764 100%);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body class="purple-gradient min-h-screen text-slate-100 p-4">
    <div class="max-w-6xl mx-auto">
      <nav class="flex gap-8 border-b border-white/10 mb-8 overflow-x-auto">
        <a href="/frontend/admin.html" class="pb-4 px-2 font-bold text-slate-400">EVENTOS</a>
        <a href="/frontend/equipo-roles.html" class="pb-4 px-2 font-bold text-slate-400">EQUIPO & ROLES</a>
        <a href="/frontend/repertorio.html" class="pb-4 px-2 font-bold border-b-4 border-purple-500 text-purple-400"
          >REPERTORIO</a
        >
      </nav>

      <div class="flex justify-between items-center mb-8">
        <h2 class="text-2xl font-bold border-l-4 border-purple-500 pl-3">Repertorio</h2>
        <button
          id="btn-abrir-cancion"
          class="bg-purple-600 px-4 py-2 rounded-lg text-sm font-bold hover:bg-purple-500 transition-all"
        >
          + Nueva Canción
        </button>
      </div>

      <div class="glass-card rounded-2xl overflow-hidden p-8 text-center">
        <i class="fas fa-music text-5xl text-slate-700 mb-4 block"></i>
        <p class="text-slate-400 italic">Administra los enlaces de YouTube y Spotify para los ensayos.</p>
      </div>
    </div>
  </body>
</html>
