<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Eventos - JEMS Band</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
      .purple-gradient {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #3b0764 100%);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>
  <body class="purple-gradient min-h-screen text-slate-100 p-4">
    <div class="max-w-6xl mx-auto">
      <nav class="flex gap-8 border-b border-white/10 mb-8 overflow-x-auto">
        <a href="/frontend/admin.html" class="pb-4 px-2 font-bold border-b-4 border-purple-500 text-purple-400"
          >EVENTOS</a
        >
        <a href="/frontend/equipo-roles.html" class="pb-4 px-2 font-bold text-slate-400">EQUIPO & ROLES</a>
        <a href="/frontend/repertorio.html" class="pb-4 px-2 font-bold text-slate-400">REPERTORIO</a>
      </nav>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1 space-y-4">
          <h2 class="text-xl font-bold text-purple-400 mb-4 border-l-4 border-purple-500 pl-3">Cronograma</h2>
          <div id="lista-cronograma" class="space-y-4">
            <div class="glass-card p-4 rounded-lg border-l-4 border-green-500">
              <p class="text-xs text-green-400 font-bold uppercase">Hoy / Próximo</p>
              <p class="font-bold text-lg">12 Abr - Jóvenes JEMS</p>
            </div>
          </div>
        </div>

        <div class="lg:col-span-2 glass-card rounded-2xl p-6 shadow-2xl">
          <h2 class="text-2xl font-bold mb-6 text-purple-400">
            <i class="fas fa-calendar-plus mr-2"></i>Nueva Actividad
          </h2>
          <form id="form-evento" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <input
                type="text"
                placeholder="Nombre"
                class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:ring-2 focus:ring-purple-500"
              />
              <input
                type="date"
                class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:ring-2 focus:ring-purple-500"
              />
            </div>
            <div class="bg-black/20 p-4 rounded-xl space-y-4">
              <h3 class="text-sm font-bold text-purple-300 uppercase italic border-b border-white/5 pb-2">
                Asignación de Lineup
              </h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm outline-none">
                  <option>Director...</option>
                </select>
                <select class="w-full bg-slate-800 border-none rounded-lg p-3 text-sm outline-none">
                  <option>Pianista...</option>
                </select>
              </div>
            </div>
            <button
              type="submit"
              class="w-full bg-purple-600 hover:bg-purple-500 p-4 rounded-xl font-bold uppercase tracking-widest transition-all"
            >
              Publicar Actividad
            </button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
