<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Admin Eventos - JEMS Band</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="icon" type="image/png" href="https://banda.micasajems.com/images/logobandajems.png" />
    <link rel="apple-touch-icon" href="https://banda.micasajems.com/images/logobandajems.png" />
    <meta name="theme-color" content="#1e1b4b" />
    <style>
      .purple-gradient {
        background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #3b0764 100%);
      }
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }
      .modal-overlay {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        backdrop-filter: blur(5px);
        z-index: 50;
        align-items: center;
        justify-content: center;
      }
      .modal-content {
        background: #1e1b4b;
        border: 1px solid rgba(168, 85, 247, 0.4);
        max-height: 95vh;
        overflow-y: auto;
      }
      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #7c3aed;
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="purple-gradient min-h-screen text-slate-100 p-4">
    <div id="modal-editar-evento" class="modal-overlay">
      <div class="modal-content w-full max-w-3xl p-6 rounded-2xl mx-4 shadow-2xl">
        <div class="flex justify-between items-center mb-6">
          <h3 class="text-2xl font-bold text-purple-400">Editar Actividad JEMS</h3>
          <button class="close-modal text-slate-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
        </div>
        <form id="form-editar-evento" class="space-y-6">
          <input type="hidden" id="edit-ev-id" />
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <input
              type="text"
              id="edit-ev-nombre"
              class="w-full bg-black/20 border border-white/10 rounded-lg p-3 outline-none focus:ring-2 focus:ring-purple-500"
            />
            <input
              type="date"
              id="edit-ev-fecha"
              class="w-full bg-black/20 border border-white/10 rounded-lg p-3 outline-none focus:ring-2 focus:ring-purple-500"
            />
          </div>
          <div class="bg-black/20 p-5 rounded-xl border border-white/5">
            <h4 class="text-purple-300 font-bold text-sm mb-4 uppercase italic">Modificar Lineup</h4>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="edit-contenedor-lineup"></div>
          </div>
          <div class="bg-black/20 p-5 rounded-xl border border-white/5">
            <h4 class="text-purple-300 font-bold text-sm mb-4 uppercase italic">Modificar Setlist</h4>
            <div class="flex gap-2 mb-4 relative">
              <input
                type="text"
                id="edit-search-song"
                list="listado-canciones"
                placeholder="Buscar canción..."
                class="flex-1 bg-white/5 border border-white/10 rounded-lg p-2 text-sm outline-none"
                autocomplete="off"
              />
              <button type="button" id="edit-btn-add-song" class="bg-purple-600 px-4 py-2 rounded-lg text-xs font-bold">
                AGREGAR
              </button>
            </div>
            <ul id="edit-lista-setlist" class="space-y-2"></ul>
          </div>
          <div class="bg-red-900/10 border border-red-500/20 p-4 rounded-xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
              <select id="edit-miembro-cambio" class="bg-slate-800 border-none rounded-lg p-2 text-sm outline-none">
                <option value="">¿Quién faltó?</option>
              </select>
              <textarea
                id="edit-nota-historico"
                rows="1"
                placeholder="Razón del cambio..."
                class="md:col-span-2 bg-black/40 border border-white/10 rounded-lg p-2 text-sm outline-none"
              ></textarea>
            </div>
          </div>
          <div class="flex gap-4">
            <button type="button" class="close-modal flex-1 bg-slate-700 p-3 rounded-xl font-bold">Cancelar</button>
            <button
              type="submit"
              class="flex-[2] bg-purple-600 hover:bg-purple-500 p-3 rounded-xl font-bold shadow-lg transition-all"
            >
              GUARDAR CAMBIOS
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="max-w-6xl mx-auto">
      <nav class="flex gap-8 border-b border-white/10 mb-8 overflow-x-auto">
        <a href="admin.html" class="pb-4 px-2 font-bold border-b-4 border-purple-500 text-purple-400 uppercase"
          >Eventos</a
        >
        <a
          href="equipo-roles.html"
          class="pb-4 px-2 font-bold text-slate-400 hover:text-purple-300 transition-colors uppercase"
          >Equipo</a
        >
        <a
          href="repertorio.html"
          class="pb-4 px-2 font-bold text-slate-400 hover:text-purple-300 transition-colors uppercase"
          >Repertorio</a
        >
      </nav>

      <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-1 space-y-4">
          <h2 class="text-xl font-bold text-purple-400 mb-4 border-l-4 border-purple-500 pl-3 uppercase">Cronograma</h2>
          <div id="lista-cronograma" class="space-y-4 text-sm"></div>
        </div>

        <div class="lg:col-span-2 glass-card rounded-2xl p-6 shadow-2xl">
          <h2 class="text-2xl font-bold mb-6 text-purple-400 flex items-center">
            <i class="fas fa-calendar-plus mr-3"></i>Nueva Actividad JEMS
          </h2>
          <form id="form-nuevo-evento" class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <input
                type="text"
                id="ev-nombre"
                placeholder="Nombre de la actividad"
                required
                class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:ring-2 focus:ring-purple-500"
              />
              <input
                type="date"
                id="ev-fecha"
                required
                class="w-full bg-white/5 border border-white/10 rounded-lg p-3 outline-none focus:ring-2 focus:ring-purple-500"
              />
            </div>
            <div class="bg-black/20 p-5 rounded-xl border border-white/5">
              <h3 class="text-purple-300 font-bold text-sm mb-4 uppercase italic">Lineup Inicial</h3>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4" id="contenedor-lineup"></div>
            </div>
            <div class="bg-black/20 p-5 rounded-xl border border-white/5">
              <h3 class="text-purple-300 font-bold text-sm mb-4 uppercase italic">Setlist</h3>
              <div class="flex gap-2 mb-4 relative">
                <input
                  type="text"
                  id="search-song"
                  list="listado-canciones"
                  placeholder="Buscar canción..."
                  class="flex-1 bg-white/5 border border-white/10 rounded-lg p-2 text-sm outline-none"
                />
                <datalist id="listado-canciones"></datalist>
                <button type="button" id="btn-add-song" class="bg-purple-600 px-4 py-2 rounded-lg text-xs font-bold">
                  AGREGAR
                </button>
              </div>
              <ul id="lista-setlist-nuevo" class="space-y-2"></ul>
            </div>
            <button
              type="submit"
              class="w-full bg-purple-600 hover:bg-purple-500 p-4 rounded-xl font-bold uppercase tracking-widest transition-all"
            >
              Publicar
            </button>
          </form>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
      $(document).ready(function () {
        const isLocal = window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
        const rutaApi = isLocal ? "http://localhost/bandajems/backend/api/" : "https://api.micasajems.com/api/";

        let miembrosBase = [],
          rolesBase = [],
          cancionesDB = [],
          setlistTemporal = [],
          setlistEdit = [];

        cargarCronograma();
        cargarDatosMaestros();
        cargarDatalistCanciones();

        function cargarCronograma() {
          $.get(rutaApi + "get_cronograma.php", function (data) {
            $("#lista-cronograma").empty();
            if (!data) return;
            data.forEach((ev) => {
              const hoy = new Date().toISOString().split("T")[0];
              let border =
                ev.fecha < hoy
                  ? "border-slate-600"
                  : ev.fecha === hoy
                    ? "border-green-500 ring-2"
                    : "border-purple-500";
              $("#lista-cronograma").append(`
                <div class="glass-card p-4 rounded-lg border-l-4 ${border} flex justify-between items-center group transition-all hover:bg-white/5">
                    <div><p class="font-bold text-slate-200">${ev.nombre_evento}</p><p class="text-[10px] text-slate-500 uppercase italic font-medium">${ev.fecha}</p></div>
                    <button onclick="abrirEditor(${ev.id}, '${ev.nombre_evento}', '${ev.fecha}')" class="opacity-0 group-hover:opacity-100 text-purple-400 p-2"><i class="fas fa-edit text-lg"></i></button>
                </div>`);
            });
          });
        }

        function cargarDatosMaestros() {
          $.get(rutaApi + "get_roles.php", function (roles) {
            rolesBase = roles;
            $.get(rutaApi + "get_miembros.php", function (miembros) {
              miembrosBase = miembros;
              renderLineupForm("#contenedor-lineup");
              renderLineupForm("#edit-contenedor-lineup");
              miembrosBase.forEach((m) =>
                $("#edit-miembro-cambio").append(`<option value="${m.id}">${m.nombre}</option>`),
              );
            });
          });
        }

        // --- LÓGICA DE LINEUP (REVISADA) ---
        function renderLineupForm(containerSelector) {
          const html = rolesBase
            .map((rol) => {
              const nombreLower = rol.nombre_rol.toLowerCase();
              let slots = 1;

              // Verificamos de forma independiente cada rol
              if (nombreLower.includes("director")) {
                slots = 3;
              } else if (nombreLower.includes("corista")) {
                slots = 4;
              }

              let selects = "";
              for (let i = 0; i < slots; i++) {
                selects += `
                <select name="rol_${rol.id}" class="select-lineup w-full bg-slate-800 border-none rounded-lg p-2 text-sm text-slate-300 mt-1">
                  <option value="">-- ${rol.nombre_rol} ${slots > 1 ? i + 1 : ""} --</option>
                  ${miembrosBase.map((m) => `<option value="${m.id}">${m.nombre}</option>`).join("")}
                </select>`;
              }
              return `<div class="flex flex-col mb-3"><label class="text-[10px] text-slate-400 uppercase font-bold ml-1">${rol.nombre_rol}</label>${selects}</div>`;
            })
            .join("");
          $(containerSelector).html(html);
        }

        function cargarDatalistCanciones() {
          $.get(rutaApi + "get_canciones.php", function (data) {
            cancionesDB = data;
            $("#listado-canciones")
              .empty()
              .append(data.map((c) => `<option value="${c.titulo}">`));
          });
        }

        function renderGenericSetlist(selector, listArray) {
          $(selector)
            .empty()
            .append(
              listArray
                .map(
                  (s, i) => `
            <li class="bg-white/5 p-3 rounded-lg border border-white/10 space-y-2">
                <div class="flex justify-between items-center">
                    <span><b class="text-purple-500">${i + 1}.</b> ${s.titulo}</span>
                    <button type="button" class="text-red-400" onclick="quitarCanGlobal('${selector}', ${i})"><i class="fas fa-times"></i></button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <select onchange="updSetGlobal('${selector}', ${i}, 'cantante_id', this.value)" class="bg-slate-800 text-[10px] rounded p-1 text-slate-300 border-none">
                        <option value="">¿Cantante?</option>
                        ${miembrosBase.map((m) => `<option value="${m.id}" ${s.cantante_id == m.id ? "selected" : ""}>${m.nombre}</option>`).join("")}
                    </select>
                    <input type="text" placeholder="Nota" value="${s.nota_tonalidad || ""}" onchange="updSetGlobal('${selector}', ${i}, 'nota_tonalidad', this.value)" class="bg-slate-800 text-[10px] rounded p-1 text-slate-300 border-none">
                </div>
            </li>`,
                )
                .join(""),
            );
        }

        window.updSetGlobal = (sel, idx, field, val) => {
          if (sel === "#lista-setlist-nuevo") setlistTemporal[idx][field] = val;
          else setlistEdit[idx][field] = val;
        };

        window.quitarCanGlobal = (sel, idx) => {
          if (sel === "#lista-setlist-nuevo") {
            setlistTemporal.splice(idx, 1);
            renderGenericSetlist(sel, setlistTemporal);
          } else {
            setlistEdit.splice(idx, 1);
            renderGenericSetlist(sel, setlistEdit);
          }
        };

        $("#btn-add-song").click(() => addSong("#search-song", setlistTemporal, "#lista-setlist-nuevo"));
        $("#edit-btn-add-song").click(() => addSong("#edit-search-song", setlistEdit, "#edit-lista-setlist"));

        function addSong(input, array, list) {
          const val = $(input).val().trim();
          if (!val) return;
          const found = cancionesDB.find((c) => c.titulo.toLowerCase() === val.toLowerCase());
          array.push({ id: found ? found.id : null, titulo: val, cantante_id: "", nota_tonalidad: "" });
          renderGenericSetlist(list, array);
          $(input).val("").focus();
        }

        window.abrirEditor = function (id, nom, fec) {
          $("#edit-ev-id").val(id);
          $("#edit-ev-nombre").val(nom);
          $("#edit-ev-fecha").val(fec);
          $("#edit-contenedor-lineup select").val("");
          $("#edit-nota-historico, #edit-miembro-cambio").val("");

          $.get(rutaApi + "get_lineup_evento.php", { evento_id: id }, (lineup) => {
            const counters = {};
            lineup.forEach((asig) => {
              counters[asig.rol_id] = (counters[asig.rol_id] || 0) + 1;
              $(`#edit-contenedor-lineup select[name="rol_${asig.rol_id}"]:eq(${counters[asig.rol_id] - 1})`).val(
                asig.miembro_id,
              );
            });
          });

          $.get(rutaApi + "get_setlist_evento.php", { evento_id: id }, (setlist) => {
            setlistEdit = setlist.map((s) => ({
              id: s.cancion_id,
              titulo: s.titulo,
              cantante_id: s.cantante_id,
              nota_tonalidad: s.nota_tonalidad,
            }));
            renderGenericSetlist("#edit-lista-setlist", setlistEdit);
            $("#modal-editar-evento").css("display", "flex").hide().fadeIn(200);
          });
        };

        $(".close-modal").on("click", () => $(".modal-overlay").fadeOut(200));

        $("#form-editar-evento, #form-nuevo-evento").on("submit", function (e) {
          e.preventDefault();
          const isEdit = this.id === "form-editar-evento";
          const container = isEdit ? "#edit-contenedor-lineup" : "#contenedor-lineup";
          let lineup = [];
          $(`${container} .select-lineup`).each(function () {
            if ($(this).val())
              lineup.push({ miembro_id: $(this).val(), rol_id: $(this).attr("name").replace("rol_", "") });
          });

          const payload = {
            evento_id: isEdit ? $("#edit-ev-id").val() : null,
            nombre: isEdit ? $("#edit-ev-nombre").val() : $("#ev-nombre").val(),
            fecha: isEdit ? $("#edit-ev-fecha").val() : $("#ev-fecha").val(),
            miembro_afectado: isEdit ? $("#edit-miembro-cambio").val() : null,
            nota: isEdit ? $("#edit-nota-historico").val() : null,
            lineup: lineup,
            setlist: isEdit ? setlistEdit : setlistTemporal,
          };

          $.ajax({
            url: rutaApi + (isEdit ? "update_evento_completo.php" : "save_evento_completo.php"),
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify(payload),
            success: () => {
              alert("¡Guardado!");
              location.reload();
            },
          });
        });
      });
    </script>
  </body>
</html>
